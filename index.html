<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cacería de Colores :3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-animation"></div>
    
    <main class="container">
        <header>
            <h1>Cacería de colores</h1>
            <p id="status-msg">Busca el color: <span id="target-color-name">Blanco</span></p>
        </header>
        
        <div class="grid" id="grid"></div>

        <div class="camera-box">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <div class="target-circle"></div>
            </div>
            <div id="detected-label">Detectando...</div>
            <button id="snap" disabled>Capturar</button>
        </div>

        <div id="treasure-info">
            <div class="success-card">
                <h3 id="next-objective">Mapa del Recorrido</h3>
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/d/u/0/embed?mid=10-bQBClo6qu1e6BK9yirCguBxUJphuI&ehbc=2E312F&noprof=1"
                        width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
                <p id="distance">Sigue los puntos numerados en el mapa</p>
                <button id="download" class="hidden">Guardar Collage</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
